<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir senha - Sistema ASSANDEF</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="body-auth">
<main class="col-lg-6 col-xl-5">
  <div class="card auth-card shadow-lg">
    <div class="card-body p-sm-5">
      <div class="mb-4">
        <h1 class="h3 fw-bold">Redefinir senha</h1>
        <p class="text-muted">Digite sua nova senha para concluir a recuperação.</p>
      </div>

      <div th:if="${erro}" class="alert alert-danger" role="alert" th:text="${erro}"></div>

      <form th:action="@{/password/reset}" method="post">
        <input type="hidden" name="token" th:value="${param.token}" />
        <div class="form-floating mb-3">
          <input type="password" class="form-control" id="newPassword" name="newPassword" placeholder="Nova senha" minlength="8" required />
          <label for="newPassword">Nova senha</label>
        </div>
        <div class="form-floating mb-3">
          <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="Confirmar senha" minlength="8" required />
          <label for="confirmPassword">Confirmar senha</label>
        </div>
        <div class="d-grid mb-3">
          <button class="btn btn-primary btn-lg" type="submit">Redefinir senha</button>
        </div>
      </form>

      <a th:href="@{/login}" class="small text-decoration-none">Voltar para login</a>
    </div>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
