spring.application.name=assandefsystem

spring.datasource.url=jdbc:mysql://localhost:3306/assandef_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.expose-request-attributes=true

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.upload.dir=uploads/boletos

# Upload - Publicacoes
app.upload.publicacoes.imagens.dir=uploads/publicacoes/imagens
app.upload.max-tamanho-bytes=2097152

security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
security.rememberme.key=${REMEMBER_ME_KEY}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

app.security.password-reset.expiration-minutes=${PASSWORD_RESET_EXPIRATION_MINUTES:15}
app.security.password-reset.frontend-url=${PASSWORD_RESET_FRONTEND_URL:http://localhost:8080/reset-password}
app.security.password-reset.mail-from=${PASSWORD_RESET_MAIL_FROM:no-reply@assandef.org.br}
